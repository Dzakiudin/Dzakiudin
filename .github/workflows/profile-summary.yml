name: Update README card

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: python -m pip install --upgrade pip pillow
      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          PROFILE_IMAGE_FILE: saulgoodman.png
          PROFILE_IMAGE_URL: https://avatars.githubusercontent.com/${{ github.repository_owner }}?s=256
          PROFILE_LEFT_MODE: ascii
          PROFILE_ASCII_FONT_SIZE: 8
          PROFILE_ASCII_LINE_H: 11
          PROFILE_EMAIL: dzakiudin07@gmail.com
          PROFILE_LINKEDIN: Ahmad Dzakiudin
          PROFILE_DISCORD: jakijukijeki
          PROFILE_FACEBOOK: jakijekijuki
          PROFILE_INSTAGRAM: jakijekiiii
        run: python profile_summary.py
      - name: Commit SVG changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README stats"
          file_pattern: "*.svg"
